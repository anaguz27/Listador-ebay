<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#e8590c" />
<title>Listador eBay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c1410; --paper:#fbf6ee; --card:#fff; --amber:#e8590c;
    --amber-soft:#fff0e6; --sage:#3d6b54; --border:#e7ddcf; --muted:#8a7d6c;
    --display:'Fraunces',Georgia,serif; --body:'Outfit',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--paper);font-family:var(--body);color:var(--ink);}
  .wrap{max-width:540px;margin:0 auto;padding:22px 18px 60px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .fadeUp{animation:fadeUp .4s ease both;}
  header{display:flex;align-items:center;gap:9px;margin-bottom:22px;}
  .logo{width:38px;height:38px;border-radius:11px;background:var(--amber);display:grid;place-items:center;box-shadow:0 6px 16px rgba(232,89,12,.27);color:#fff;font-size:20px;}
  h1{font-family:var(--display);font-size:25px;font-weight:700;margin:0;line-height:1;}
  .sub{margin:3px 0 0;font-size:13px;color:var(--muted);}
  .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:18px;}
  .lbl{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.02em;text-transform:uppercase;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
  .thumb{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;border:1px solid var(--border);}
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .thumb button{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;border:none;background:rgba(0,0,0,.6);color:#fff;display:grid;place-items:center;cursor:pointer;}
  .act{border:1px solid var(--border);background:#fff;color:var(--ink);border-radius:14px;padding:16px 12px;font-size:15px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px;font-family:var(--body);}
  .hint{margin:10px 2px 0;font-size:12.5px;color:var(--muted);line-height:1.5;}
  select,textarea,input{font-family:var(--body);}
  select{width:100%;border:1px solid var(--border);border-radius:12px;padding:11px 13px;font-size:15px;color:var(--ink);background:var(--paper);}
  textarea{width:100%;border:1px solid var(--border);border-radius:12px;padding:11px 13px;font-size:15px;resize:vertical;color:var(--ink);background:var(--paper);}
  .gen{width:100%;border:none;border-radius:16px;padding:16px;font-size:16px;font-weight:600;color:#fff;background:var(--amber);box-shadow:0 10px 24px rgba(232,89,12,.28);display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;font-family:var(--body);}
  .gen:disabled{background:#d8cdbd;box-shadow:none;cursor:default;}
  .err{margin-top:16px;background:#fff4f0;border:1px solid #ffd3c2;border-radius:14px;padding:14px;display:flex;gap:10px;align-items:flex-start;}
  .err strong{font-size:14px;color:#9c2a14;}
  .err p{margin:3px 0 0;font-size:13.5px;color:#8a4030;}
  .field-h{display:flex;align-items:center;gap:7px;margin-bottom:7px;font-size:12.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;}
  .field-h.warn{color:#c0341a;}
  .chip{background:var(--amber-soft);color:#b8430a;border-radius:8px;padding:4px 9px;font-size:13px;font-weight:500;}
  .spec{display:flex;gap:8px;font-size:14px;align-items:baseline;}
  .spec .k{color:var(--muted);min-width:96px;font-weight:500;}
  .resbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
  .primary{border:none;background:var(--ink);color:#fff;border-radius:14px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--body);}
  .ghost{border:1px solid var(--border);background:#fff;color:var(--ink);border-radius:14px;padding:14px;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--body);}
  .ed{border:1px solid var(--border);background:#fff;color:var(--ink);border-radius:10px;padding:7px 12px;font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:6px;cursor:pointer;font-family:var(--body);}
  .ed.on{background:var(--ink);color:#fff;}
  .edin{width:100%;border:1px solid var(--border);border-radius:10px;padding:9px 11px;font-size:15px;outline:none;color:var(--ink);background:var(--paper);font-family:var(--body);}
  h2{font-family:var(--display);font-size:22px;font-weight:600;margin:0;}
  /* Bloque de notas (referencia + notas fijas) */
  .notesblock{background:var(--amber-soft);border:1px solid #f4d9c4;border-radius:12px;padding:13px 14px;}
  .notesblock p{margin:0;font-size:14px;line-height:1.55;white-space:pre-wrap;color:#5c3a22;}
  .detected{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);border-radius:999px;padding:4px 11px;font-size:12.5px;font-weight:500;color:var(--ink);margin-bottom:9px;}
  /* Ajustes */
  .settings-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;border:none;background:transparent;cursor:pointer;font-family:var(--body);font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.02em;padding:0;}
  .set-row{margin-top:12px;}
  .set-row label{display:block;font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:5px;}
  .set-row textarea{font-size:13.5px;}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .seg button{border:none;background:#fff;color:var(--muted);padding:7px 13px;font-size:13.5px;font-weight:500;cursor:pointer;font-family:var(--body);}
  .seg button.on{background:var(--ink);color:#fff;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">🏷️</div>
    <div>
      <h1>Listador eBay</h1>
      <p class="sub">Sube fotos · obtén el listado optimizado</p>
    </div>
  </header>

  <section class="card fadeUp">
    <label class="lbl">Fotos del producto (<span id="count">0</span>/16)</label>
    <div class="thumbs" id="thumbs"></div>
    <div class="grid2">
      <button class="act" id="btnCam">📷<span>Cámara</span></button>
      <button class="act" id="btnGal">⬆️<span>Galería</span></button>
    </div>
    <input id="inCam" type="file" accept="image/*,.heic,.heif" capture="environment" hidden>
    <input id="inGal" type="file" accept="image/*,.heic,.heif" multiple hidden>
    <p class="hint">Incluye etiquetas, talla, marca y cualquier detalle de desgaste. Las fotos se comprimen solas para no fallar. Máx. 16.</p>
  </section>

  <section class="card fadeUp" style="margin-top:16px">
    <label class="lbl">Estado del producto</label>
    <select id="cond">
      <option>New with tags</option>
      <option>New without tags</option>
      <option>Pre-owned - Like new</option>
      <option selected>Pre-owned - Good</option>
      <option>Pre-owned - Acceptable</option>
      <option>For parts or not working</option>
    </select>
    <label class="lbl" style="margin-top:14px">Notas extra (opcional)</label>
    <textarea id="notes" rows="2" placeholder="Ej.: talla M, falta un botón, viene con caja original…"></textarea>
  </section>

  <div class="fadeUp" style="margin-top:18px">
    <button class="gen" id="btnGen" disabled>✨ Generar listado</button>
  </div>

  <div id="errBox"></div>
  <div id="result"></div>

  <!-- AJUSTES (textos fijos editables) -->
  <section class="card fadeUp" style="margin-top:18px">
    <button class="settings-toggle" id="setToggle">
      <span>⚙️ Ajustes de notas fijas</span>
      <span id="setArrow">▾</span>
    </button>
    <div id="setBody" style="display:none">
      <p class="hint" style="margin-top:6px">Estos textos se añaden automáticamente arriba de la descripción. Edítalos a tu gusto; se guardan en este dispositivo.</p>
      <div class="set-row">
        <label>📸 Pin si la prenda está en MANIQUÍ (usa {item} para el tipo de prenda)</label>
        <textarea id="setMannequin" rows="2"></textarea>
      </div>
      <div class="set-row">
        <label>📸 Pin si la prenda está en GANCHO / PERCHA (usa {item})</label>
        <textarea id="setHanger" rows="2"></textarea>
      </div>
      <div class="set-row">
        <label>🧺 Notas fijas (color, medidas, envío, lavado). Usa {emoji} y {item}</label>
        <textarea id="setFixed" rows="6"></textarea>
      </div>
      <div class="set-row" style="display:flex;gap:10px;margin-top:14px">
        <button class="primary" id="setSave" style="flex:1">💾 Guardar</button>
        <button class="ghost" id="setReset" style="flex:1">↩️ Restaurar</button>
      </div>
    </div>
  </section>
</div>

<script>
const MAX = 16;
let images = []; // {id, dataUrl, mediaType}
let listing = null;
let editing = false;

const $ = (id) => document.getElementById(id);

// ---- Catálogo de prendas con emoji (clave en inglés) ----
const GARMENTS = {
  blouse:   {emoji:'👚', es:'blusa',         en:'blouse'},
  shorts:   {emoji:'🩳', es:'short',         en:'shorts'},
  dress:    {emoji:'👗', es:'vestido',       en:'dress'},
  pants:    {emoji:'👖', es:'pantalón',      en:'pants'},
  shoes:    {emoji:'👟', es:'zapatos',       en:'shoes'},
  sweater:  {emoji:'🧥', es:'suéter',        en:'sweater'},
  bra:      {emoji:'👙', es:'brasier',       en:'bra'},
  swimsuit: {emoji:'🩱', es:'traje de baño', en:'swimsuit'},
  bag:      {emoji:'👜', es:'bolsa',         en:'bag'},
};

// ---- Orden de campos (item specifics) como los muestra eBay ----
// Mismo formato para TODAS las prendas. La IA llena los que pueda; el resto
// se muestran vacíos con "—" para completar a mano (o dejarlos en blanco).
const SPEC_TEMPLATE = [
  "Brand","Department","Size Type","Size","Style","Dress Length","Color",
  "Sleeve Length","Sleeve Type","Pattern","Occasion","Material","Theme","Neckline",
  "Fabric Type","Character","Vintage","Season","Closure","Accents","Features",
  "Country of Origin","Handmade","Garment Care","Fabric Weight","UPC","Condition"
];

// Toma lo que devolvió la IA y lo reordena/completa según la plantilla de eBay.
// Los campos que la IA no llenó quedan con valor "" para completar a mano.
function orderedSpecs(l){
  const got = {};
  (l.item_specifics||[]).forEach(s=>{ if(s && s.label) got[s.label.toLowerCase()] = s.value||""; });
  const used = new Set();
  const result = SPEC_TEMPLATE.map(label=>{
    used.add(label.toLowerCase());
    return {label, value: got[label.toLowerCase()] || ""};
  });
  // Cualquier campo extra que la IA haya añadido y no esté en la plantilla, lo agregamos al final
  (l.item_specifics||[]).forEach(s=>{
    if(s && s.label && !used.has(s.label.toLowerCase())) result.push({label:s.label, value:s.value||""});
  });
  return result;
}

// ---- Notas fijas por defecto (editables en Ajustes) ----
const NOTES_VERSION = 2; // súbelo si cambias los textos por defecto para forzar refresco
const DEFAULT_NOTES = {
  mannequin: "📌 Note: Images are for reference only to demonstrate fit and style. The actual {item} is the same as shown in the mannequin photos. Slight variations in color or details may occur due to lighting and screen settings.",
  hanger: "📌 Note: Images are for reference only to show fit and style. The actual {item} is the same as shown in the photos on the hanger. Slight variations in color or details may occur due to lighting and screen settings.",
  fixed:
`{emoji} The {item} is used but in good condition.
📸 The color may vary slightly due to lighting and photography.
📏 Measurements were taken with the garment laid out flat on a surface. It's recommended to compare with a similar garment to ensure the desired fit.
🚚 Ships next business day after payment.
🧼 The clothing was only steamed, so it may need to be washed before use.`
};

function getNotes(){
  try{
    const saved = JSON.parse(localStorage.getItem('ebayNotes')||'null');
    const ver = Number(localStorage.getItem('ebayNotesVer')||'0');
    if(saved && saved.mannequin && saved.hanger && saved.fixed && ver>=NOTES_VERSION) return saved;
  }catch{}
  // No hay notas, o son de una versión vieja: usar las nuevas por defecto y guardarlas
  saveNotes({...DEFAULT_NOTES});
  return {...DEFAULT_NOTES};
}
function saveNotes(n){ try{ localStorage.setItem('ebayNotes', JSON.stringify(n)); localStorage.setItem('ebayNotesVer', String(NOTES_VERSION)); }catch{} }

// ---- Compresión de imágenes (robusta: HEIC/HEIF, fallbacks, sin colgarse) ----
function drawToJpeg(source, w, h){
  const max=1024;
  if(w>h && w>max){ h=Math.round(h*max/w); w=max; }
  else if(h>max){ w=Math.round(w*max/h); h=max; }
  const c=document.createElement('canvas');
  c.width=w; c.height=h;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
  ctx.drawImage(source,0,0,w,h);
  return {dataUrl:c.toDataURL('image/jpeg',0.8),mediaType:'image/jpeg'};
}
function loadViaImageEl(file){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{ try{ resolve(drawToJpeg(img,img.naturalWidth,img.naturalHeight)); }catch(e){ reject(e); } finally{ URL.revokeObjectURL(url); } };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('decode-failed')); };
    img.src=url;
  });
}
async function compress(file){
  if('createImageBitmap' in window){
    try{
      const bmp=await createImageBitmap(file);
      const r=drawToJpeg(bmp,bmp.width,bmp.height);
      if(bmp.close) bmp.close();
      return r;
    }catch(_){ /* cae al fallback */ }
  }
  return await loadViaImageEl(file);
}

async function addFiles(fileList){
  let skipped=0;
  for(const file of Array.from(fileList)){
    if(!file.type.startsWith('image/') && !/\.(heic|heif)$/i.test(file.name)){ skipped++; continue; }
    if(images.length>=MAX) break;
    try{
      const {dataUrl,mediaType}=await compress(file);
      images.push({id:crypto.randomUUID(),dataUrl,mediaType});
    }catch(_){ skipped++; }
  }
  renderThumbs();
  if(skipped>0){
    $('errBox').innerHTML=`<div class="err fadeUp">⚠️<div><strong>${skipped} foto(s) no se pudieron añadir</strong><p>Pueden estar dañadas o en un formato no compatible. Las demás sí se cargaron.</p></div></div>`;
    setTimeout(()=>{ if($('errBox')) $('errBox').innerHTML=''; }, 6000);
  }
}

function renderThumbs(){
  const box=$('thumbs');
  box.innerHTML='';
  images.forEach((img)=>{
    const d=document.createElement('div');
    d.className='thumb';
    d.innerHTML=`<img src="${img.dataUrl}"><button data-id="${img.id}">✕</button>`;
    box.appendChild(d);
  });
  box.querySelectorAll('button').forEach(b=>{
    b.onclick=()=>{ images=images.filter(i=>i.id!==b.dataset.id); renderThumbs(); };
  });
  $('count').textContent=images.length;
  $('btnGen').disabled = images.length===0;
}

$('btnCam').onclick=()=>$('inCam').click();
$('btnGal').onclick=()=>$('inGal').click();
$('inCam').onchange=(e)=>addFiles(e.target.files);
$('inGal').onchange=(e)=>addFiles(e.target.files);

// ---- Generar ----
$('btnGen').onclick=async ()=>{
  if(images.length===0) return;
  const btn=$('btnGen');
  btn.disabled=true;
  btn.innerHTML='<span style="display:inline-block;animation:spin 1s linear infinite">⏳</span> Analizando fotos…';
  $('errBox').innerHTML='';
  $('result').innerHTML='';

  try{
    const res=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        images: images.map(i=>({data:i.dataUrl.split(',')[1], mediaType:i.mediaType})),
        condition: $('cond').value,
        extraNotes: $('notes').value,
      }),
    });
    const data=await res.json();
    if(!res.ok) throw new Error(data.error || 'Error en el servidor.');
    listing=data;
    // Reordenar y completar los item specifics según el orden de eBay para esta prenda
    listing.item_specifics = orderedSpecs(listing);
    editing=false;
    renderResult();
  }catch(err){
    $('errBox').innerHTML=`<div class="err fadeUp">⚠️<div><strong>No se pudo generar</strong><p>${err.message}</p></div></div>`;
  }finally{
    btn.disabled=images.length===0;
    btn.innerHTML='✨ Generar listado';
  }
};

// ---- Construir el bloque de notas fijas según prenda detectada ----
function buildNotesBlock(l){
  const notes=getNotes();
  const g = GARMENTS[l.garment] || null;
  const emoji = g ? g.emoji : '🏷️';
  const itemEn = g ? g.en : 'item';
  const isPlural = /s$/i.test(itemEn) && itemEn.toLowerCase()!=='dress'; // shoes, pants, shorts
  const pin = (l.display==='mannequin') ? notes.mannequin : notes.hanger;
  let filled = (txt)=> (txt||'')
      .replaceAll('{emoji}', emoji)
      .replaceAll('{item}', itemEn);
  let block = filled(pin) + "\n\n" + filled(notes.fixed);
  // Concordancia para prendas en plural (p. ej. "shoes are" en vez de "shoes is")
  if(isPlural){
    block = block
      .replace(new RegExp(`(the actual ${itemEn}) is\\b`,'gi'), '$1 are')
      .replace(new RegExp(`(This ${itemEn}) is\\b`,'gi'), '$1 are');
  }
  return block;
}

// ---- Texto plano del listado (notas arriba, igual que en eBay) ----
function buildText(l){
  const specs=(l.item_specifics||[])
    .filter(s=> (s.value||'').trim()!=='') // solo los que tienen valor
    .map(s=>`${s.label}: ${s.value}`).join('\n');
  const kw=(l.keywords||[]).join(', ');
  const notesBlock=buildNotesBlock(l);
  const fullDesc = notesBlock + "\n\n" + (l.description||'');
  return `${l.title||''}\n\nCATEGORY: ${l.category||''}\n\nITEM SPECIFICS:\n${specs}\n\nDESCRIPTION:\n${fullDesc}\n\nKEYWORDS (theme): ${kw}\n\nSUGGESTED PRICE: $${l.price_min} – $${l.price_max} USD`;
}

// ---- Render del resultado ----
function renderResult(){
  const l=listing;
  if(!l){$('result').innerHTML='';return;}
  const tlen=(l.title||'').length;
  const g = GARMENTS[l.garment] || null;
  const detectedLabel = g ? `${g.emoji} ${g.es}` : '🏷️ prenda';
  const displayLabel = (l.display==='mannequin') ? '🧍 Maniquí' : '🪝 Gancho';
  const notesBlock=buildNotesBlock(l);

  const specsHtml=(l.item_specifics||[]).map((s,i)=>
    editing
    ? `<div class="spec"><span class="k">${s.label}</span><input class="edin" data-spec="${i}" value="${(s.value||'').replace(/"/g,'&quot;')}" placeholder="— completar —" style="font-size:14px;padding:6px 9px"></div>`
    : `<div class="spec"><span class="k">${s.label}</span><span style="${s.value?'':'color:var(--muted)'}">${s.value||'—'}</span></div>`
  ).join('');
  const kwHtml=(l.keywords||[]).map(k=>`<span class="chip">${k}</span>`).join(' ');

  $('result').innerHTML=`
    <section class="fadeUp" style="margin-top:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2>Tu listado</h2>
        <button class="ed ${editing?'on':''}" id="btnEdit">✏️ ${editing?'Listo':'Editar'}</button>
      </div>
      <div class="card" style="display:flex;flex-direction:column;gap:16px">
        <div>
          <div class="field-h ${tlen>80?'warn':''}">🏷️ Título (${tlen}/80)</div>
          ${editing?`<input class="edin" id="edTitle" value="${(l.title||'').replace(/"/g,'&quot;')}">`:`<p style="margin:0;font-size:16px;font-weight:600;line-height:1.35">${l.title||''}</p>`}
        </div>
        <div>
          <div class="field-h">📁 Categoría</div>
          ${editing?`<input class="edin" id="edCat" value="${(l.category||'').replace(/"/g,'&quot;')}">`:`<p style="margin:0;font-size:14.5px">${l.category||''}</p>`}
        </div>
        ${specsHtml?`<div><div class="field-h">✅ Item specifics</div><div style="display:grid;gap:6px">${specsHtml}</div></div>`:''}
        <div>
          <div class="field-h">📝 Descripción</div>
          <div style="display:flex;gap:8px;margin-bottom:9px">
            <span class="detected">Detectado: ${detectedLabel}</span>
            <span class="detected">${displayLabel}</span>
          </div>
          <div class="notesblock" style="margin-bottom:10px"><p>${notesBlock.replace(/</g,'&lt;')}</p></div>
          ${editing?`<textarea id="edDesc" rows="5" class="edin">${l.description||''}</textarea>`:`<p style="margin:0;font-size:14.5px;line-height:1.55;white-space:pre-wrap">${l.description||''}</p>`}
        </div>
        ${kwHtml?`<div><div class="field-h">🔍 Keywords (theme)</div><div style="display:flex;flex-wrap:wrap;gap:6px">${kwHtml}</div></div>`:''}
        <div>
          <div class="field-h">💲 Precio sugerido</div>
          ${editing
            ? `<div style="display:flex;align-items:center;gap:8px">
                 <span style="font-size:16px;font-weight:600;color:var(--sage)">$</span>
                 <input class="edin" id="edPmin" type="number" inputmode="decimal" value="${l.price_min}" style="width:90px">
                 <span style="color:var(--muted)">–</span>
                 <input class="edin" id="edPmax" type="number" inputmode="decimal" value="${l.price_max}" style="width:90px">
                 <span style="font-size:13px;color:var(--muted)">USD</span>
               </div>`
            : `<p style="margin:0;font-size:18px;font-weight:700;color:var(--sage)">$${l.price_min} – $${l.price_max} <span style="font-size:13px;color:var(--muted);font-weight:500">USD</span></p>`}
        </div>
      </div>
      <div class="resbtns">
        <button class="primary" id="btnCopy">📋 Copiar todo</button>
        <button class="ghost" id="btnShare">🔗 Compartir</button>
        <button class="ghost" id="btnDl">⬇️ Descargar</button>
        <button class="ghost" id="btnNew">🔄 Nuevo</button>
      </div>
    </section>`;

  // Listeners del resultado
  $('btnEdit').onclick=()=>{ saveEdits(); editing=!editing; renderResult(); };
  $('btnCopy').onclick=copyAll;
  $('btnShare').onclick=shareIt;
  $('btnDl').onclick=download;
  $('btnNew').onclick=resetAll;
}

function saveEdits(){
  if(!editing) return;
  const t=$('edTitle'); if(t) listing.title=t.value;
  const c=$('edCat'); if(c) listing.category=c.value;
  const d=$('edDesc'); if(d) listing.description=d.value;
  const pmin=$('edPmin'); if(pmin && pmin.value!=='') listing.price_min=Number(pmin.value);
  const pmax=$('edPmax'); if(pmax && pmax.value!=='') listing.price_max=Number(pmax.value);
  document.querySelectorAll('[data-spec]').forEach(inp=>{
    listing.item_specifics[+inp.dataset.spec].value=inp.value;
  });
}

async function copyAll(){
  saveEdits();
  const txt=buildText(listing);
  try{ await navigator.clipboard.writeText(txt); }
  catch{ const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta); }
  const b=$('btnCopy'); b.innerHTML='✅ Copiado'; setTimeout(()=>b.innerHTML='📋 Copiar todo',1800);
}
async function shareIt(){
  saveEdits();
  const txt=buildText(listing);
  if(navigator.share){ try{ await navigator.share({title:listing.title,text:txt}); }catch{} }
  else copyAll();
}
function download(){
  saveEdits();
  const txt=buildText(listing);
  const blob=new Blob([txt],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const safe=(listing.title||'listado').slice(0,40).replace(/[^\w]+/g,'-');
  a.href=url;a.download=safe+'.txt';document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function resetAll(){
  images=[];listing=null;editing=false;
  $('notes').value='';
  $('cond').selectedIndex=3; // vuelve a "Pre-owned - Good"
  renderThumbs();renderResult();$('errBox').innerHTML='';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ---- AJUSTES ----
function loadSettingsUI(){
  const n=getNotes();
  $('setMannequin').value=n.mannequin;
  $('setHanger').value=n.hanger;
  $('setFixed').value=n.fixed;
}
$('setToggle').onclick=()=>{
  const body=$('setBody');
  const open = body.style.display==='none';
  body.style.display = open?'block':'none';
  $('setArrow').textContent = open?'▴':'▾';
  if(open) loadSettingsUI();
};
$('setSave').onclick=()=>{
  const n={
    mannequin:$('setMannequin').value,
    hanger:$('setHanger').value,
    fixed:$('setFixed').value,
  };
  saveNotes(n);
  const b=$('setSave'); b.innerHTML='✅ Guardado'; setTimeout(()=>b.innerHTML='💾 Guardar',1600);
  if(listing) renderResult();
};
$('setReset').onclick=()=>{
  saveNotes({...DEFAULT_NOTES});
  loadSettingsUI();
  const b=$('setReset'); b.innerHTML='✅ Restaurado'; setTimeout(()=>b.innerHTML='↩️ Restaurar',1600);
  if(listing) renderResult();
};
</script>
</body>
</html>
